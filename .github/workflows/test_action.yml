name: Test Action

on:
  workflow_dispatch:
  push:
    branches: [feat/gh-action] # TODO: remove once verified; workflow_dispatch needs this on main to be API-dispatchable

jobs:
  smoke-test:
    name: Run action (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-13, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v7
      - name: Run embd action
        uses: ./
        with:
          version: v0.1.0
          args: status
